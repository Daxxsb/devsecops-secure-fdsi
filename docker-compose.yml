# =============================================================
# Docker Compose - Arquitectura Unsecure
# Levanta: PostgreSQL + Spring Boot app
#
# Uso:
#   docker-compose up --build     <- primera vez
#   docker-compose up -d          <- modo background
#   docker-compose down           <- detener y limpiar
#   docker-compose logs -f app    <- ver logs en tiempo real
# =============================================================

services:

  # Base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: unsecure-db
    environment:
      # VULNERABILIDAD: Credenciales debiles en variables de entorno
      # En produccion real estas deberian estar en Docker Secrets o Vault
      POSTGRES_DB: unsecuredb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      # Script SQL de inicializacion se ejecuta automaticamente
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unsecure-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d unsecuredb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicacion Spring Boot
  app:
    build: .
    container_name: unsecure-app
    ports:
      - "8080:8080"
    environment:
      # Las mismas credenciales que en application.properties
      # VULNERABILIDAD: duplicadas aqui y en el archivo de propiedades
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/unsecuredb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unsecure-net
    restart: on-failure

networks:
  unsecure-net:
    driver: bridge

volumes:
  postgres_data:
