# =============================================================
# Docker Compose - Arquitectura Secure
# Levanta: PostgreSQL + Spring Boot app
# =============================================================

services:

  # Base de datos PostgreSQL
  db:
    image: postgres:15
    container_name: secure-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unsecuredb}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_UseEnv!}
    ports:
      - "5432:5432"
    volumes:
      # Script SQL de inicializacion se ejecuta automaticamente
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unsecure-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-unsecuredb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicacion Spring Boot
  app:
    build: .
    container_name: secure-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-unsecuredb}
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_UseEnv!}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - unsecure-net
    restart: on-failure

networks:
  unsecure-net:
    driver: bridge

volumes:
  postgres_data:
