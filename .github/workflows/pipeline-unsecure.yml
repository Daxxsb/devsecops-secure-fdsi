name: Pipeline Tradicional (Unsecure)

# =============================================================
# ARQUITECTURA TRADICIONAL SIN CONTROLES DE SEGURIDAD
# Corresponde al Diagrama 1 del paper DevSecOps - ECIJ
#
# Flujo: Commit -> Build -> Docker Build -> Deploy
#
# AUSENCIAS INTENCIONALES (lo que el pipeline secure agregara):
#   [X] Sin SAST (analisis estatico de codigo)
#   [X] Sin escaneo de dependencias vulnerables
#   [X] Sin escaneo de imagen Docker (Trivy)
#   [X] Sin pruebas DAST (OWASP ZAP)
#   [X] Sin bloqueo por vulnerabilidades criticas
#
# El pipeline pasa VERDE aunque el codigo tenga SQL Injection,
# MD5, credenciales hardcodeadas y dependencias con CVEs.
# =============================================================

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven
        run: mvn clean package -DskipTests
        # AUSENCIA: Sin tests de seguridad en este paso
        # AUSENCIA: Sin analisis SAST del codigo fuente
        # AUSENCIA: Sin verificacion de dependencias vulnerables

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Construir imagen Docker
        run: docker build -t unsecure-login:${{ github.sha }} .
        # AUSENCIA: Sin escaneo de la imagen con Trivy
        # La imagen se construye con la imagen base vulnerable
        # y el pipeline no detecta ningun CVE

      - name: Simular push a registry
        run: |
          echo "Imagen construida: unsecure-login:${{ github.sha }}"
          echo "PIPELINE TRADICIONAL: Imagen lista para deploy"
          echo "No se realizo ningun control de seguridad"
          echo "Vulnerabilidades presentes:"
          echo "  - SQL Injection en UserRepository.java"
          echo "  - MD5 para hashing de contrasenas"
          echo "  - Credenciales hardcodeadas en application.properties"
          echo "  - Imagen base con CVEs sin parchear"
          echo "  - Sin rate limiting en endpoint de login"
          echo "Todas estas vulnerabilidades llegaron a produccion sin ser detectadas."

  deploy:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Deploy (simulado)
        run: |
          echo "================================================"
          echo "ARQUITECTURA TRADICIONAL (UNSECURE)"
          echo "================================================"
          echo "Desplegando en entorno de produccion..."
          echo "App disponible en: http://localhost:8080"
          echo ""
          echo "RESULTADO: Pipeline completado exitosamente"
          echo "El codigo vulnerable llego a produccion."
          echo "Las pruebas de seguridad ocurriran (si acaso)"
          echo "despues del despliegue, cuando ya es tarde."
          echo "================================================"
        # AUSENCIA: Sin pruebas DAST post-deploy
        # En la arquitectura secure, OWASP ZAP se ejecuta
        # contra el ambiente desplegado antes de marcar el deploy como exitoso
