name: Pipeline DevSecOps (Secure)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      demo_continue_after_secret_scan:
        description: "Demo only: continue even if secret scan fails"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      demo_continue_after_sast:
        description: "Demo only: continue even if SpotBugs fails"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      demo_continue_after_sca:
        description: "Demo only: continue even if dependency-check fails"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      demo_continue_after_trivy:
        description: "Demo only: continue even if Trivy fails"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        id: secret_scan
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_secret_scan == 'true' }}
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          extra_args: --results=verified,unknown

      - name: Enforce secret scan gate
        if: ${{ steps.secret_scan.outcome == 'failure' && !(github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_secret_scan == 'true') }}
        run: exit 1

  build-sast-sca:
    name: Build + SAST + SCA
    runs-on: ubuntu-latest
    needs: secret-scan
    if: ${{ needs.secret-scan.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile and run tests
        run: mvn -B clean test

      - name: SAST - SpotBugs gate
        id: sast_gate
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_sast == 'true' }}
        run: mvn -B spotbugs:check

      - name: Enforce SAST gate
        if: ${{ steps.sast_gate.outcome == 'failure' && !(github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_sast == 'true') }}
        run: exit 1

      - name: SCA - OWASP Dependency-Check gate
        id: sca_gate
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_sca == 'true' }}
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Enforce SCA gate
        if: ${{ steps.sca_gate.outcome == 'failure' && !(github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_sca == 'true') }}
        run: exit 1

      - name: Generate SBOM (CycloneDX)
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:makeBom

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-build
          path: |
            target/spotbugsXml.xml
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/bom.xml
            target/bom.json

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: build-sast-sca
    if: ${{ needs.build-sast-sca.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Docker image
        run: docker build -t secure-login:${{ github.sha }} .

      - name: Scan Docker image with Trivy
        id: trivy_gate
        continue-on-error: ${{ github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_trivy == 'true' }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: secure-login:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Enforce Trivy gate
        if: ${{ steps.trivy_gate.outcome == 'failure' && !(github.event_name == 'workflow_dispatch' && inputs.demo_continue_after_trivy == 'true') }}
        run: exit 1

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build-scan
    if: ${{ needs.docker-build-scan.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build and start stack (staging)
        run: docker compose up --build -d

      - name: Verify application is up
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/login > /dev/null; then
              echo "Application is ready"
              exit 0
            fi
            sleep 5
          done
          echo "Application did not become ready in time"
          exit 1

      - name: Upload deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs
          path: |
            docker-compose.yml

  dast-post-deploy:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: ${{ needs.deploy-staging.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Start stack for DAST
        run: docker compose up --build -d

      - name: Wait for app to be reachable
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/login > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:8080
          fail_action: true
          cmd_options: '-a'

      - name: Stop stack
        if: always()
        run: docker compose down -v

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: dast-post-deploy
    if: ${{ needs.dast-post-deploy.result == 'success' }}

    steps:
      - name: Production deploy approval gate passed
        run: |
          echo "All security controls passed."
          echo "Deploying to production..."
