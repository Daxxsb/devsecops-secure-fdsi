name: Pipeline DevSecOps (Demo SCA Gate)

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@v3.90.5
        with:
          path: ./
          extra_args: --results=verified,unknown

  build-sast-sca:
    name: Build + SAST + SCA (SAST bypass for demo)
    runs-on: ubuntu-latest
    needs: secret-scan
    if: ${{ needs.secret-scan.result == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile and run tests (without security gates)
        run: mvn -B clean test

      - name: SAST - SpotBugs gate (demo bypass)
        continue-on-error: true
        run: mvn -B spotbugs:check

      - name: SCA - OWASP Dependency-Check gate
        run: mvn -B org.owasp:dependency-check-maven:check

      - name: Generate SBOM (CycloneDX)
        if: always()
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:makeBom

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-build-demo-sca
          path: |
            target/spotbugsXml.xml
            target/dependency-check-report.html
            target/dependency-check-report.json
            target/bom.xml
            target/bom.json

  docker-build-scan:
    name: Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: build-sast-sca
    if: ${{ needs.build-sast-sca.result == 'success' }}

    steps:
      - name: Docker step should be blocked by SCA in this demo
        run: echo "If this runs, SCA did not block the pipeline as expected."
