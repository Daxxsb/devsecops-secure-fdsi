<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- VULNERABILIDAD: Sin Content-Security-Policy header -->
    <!-- VULNERABILIDAD: Sin X-Frame-Options (clickjacking posible) -->
    <title>Login - Sistema Unsecure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .badge-unsecure {
            background: #dc3545;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: rgba(255,255,255,0.4);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #c73652;
        }

        .error-box {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff6b7a;
            font-size: 13px;
        }

        .vuln-hint {
            margin-top: 24px;
            padding: 14px;
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.2);
            border-radius: 8px;
        }

        .vuln-hint p {
            color: rgba(255, 193, 7, 0.8);
            font-size: 12px;
            line-height: 1.5;
        }

        .vuln-hint code {
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <span class="badge-unsecure">⚠ ARQUITECTURA UNSECURE</span>
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Sistema de autenticación sin controles de seguridad</p>

        <!-- Mensaje de error -->
        <div class="error-box" th:if="${error}">
            <span th:text="${error}">Error de autenticación</span>
        </div>

        <!--
            VULNERABILIDAD: Formulario sin token CSRF
            Spring Boot sin Spring Security no agrega proteccion CSRF.
            Un atacante puede enviar un formulario desde otro sitio
            y el servidor lo procesara como valido.
        -->
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text"
                       id="username"
                       name="username"
                       th:value="${username}"
                       placeholder="Ingresa tu usuario"
                       autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <!--
                    VULNERABILIDAD: Sin proteccion contra autocompletar
                    autocomplete="current-password" permite que el browser
                    guarde la contrasena, lo cual es un riesgo en equipos compartidos
                -->
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <!-- Hint de vulnerabilidad para el video demo -->
        <div class="vuln-hint">
            <p><strong style="color:#ffc107">Demo SQL Injection:</strong><br>
            Usuario: <code>' OR '1'='1' --</code><br>
            Contraseña: <code>cualquier cosa</code></p>
        </div>
    </div>
</body>
</html>
