<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Secure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .badge-secure {
            background: #198754;
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: rgba(255,255,255,0.4);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #c73652;
        }

        .error-box {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.4);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff6b7a;
            font-size: 13px;
        }

        .security-hint {
            margin-top: 24px;
            padding: 14px;
            background: rgba(25, 135, 84, 0.12);
            border: 1px solid rgba(25, 135, 84, 0.3);
            border-radius: 8px;
        }

        .security-hint p {
            color: rgba(25, 135, 84, 0.95);
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <span class="badge-secure">ARQUITECTURA SECURE</span>
        <h1>Iniciar sesión</h1>
        <p class="subtitle">Sistema con controles de autenticación y seguridad</p>

        <div class="error-box" th:if="${param.error}">
            Credenciales invalidas.
        </div>

        <div class="error-box" style="background: rgba(25, 135, 84, 0.15); border-color: rgba(25, 135, 84, 0.4); color: #9ee5b5;" th:if="${param.logout}">
            Sesion cerrada correctamente.
        </div>

        <form method="POST" action="/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text"
                       id="username"
                       name="username"
                       placeholder="Ingresa tu usuario"
                       autocomplete="username"
                       required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Ingresa tu contraseña"
                       autocomplete="current-password"
                       required>
            </div>

            <button type="submit" class="btn-login">Ingresar</button>
        </form>

        <div class="security-hint">
            <p><strong>Seguridad activa:</strong> autenticacion protegida con Spring Security,
            validacion CSRF y passwords con BCrypt.</p>
        </div>
    </div>
</body>
</html>
