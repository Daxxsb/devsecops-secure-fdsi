# =============================================================
# VULNERABILIDAD #1: Credenciales hardcodeadas en el codigo
# Cualquier persona con acceso al repositorio puede ver estos datos
# OWASP Top 10 - A02:2021 Cryptographic Failures
# Detectable con: Trivy (escaneo de imagen) y SAST (SpotBugs)
# =============================================================

# Configuracion de base de datos - credenciales en texto plano
spring.datasource.url=jdbc:postgresql://db:5432/unsecuredb
spring.datasource.username=admin
spring.datasource.password=admin123

# Configuracion de la aplicacion
spring.application.name=unsecure-login
server.port=8080

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# VULNERABILIDAD #2: Logs en nivel DEBUG exponen informacion sensible
# Los logs muestran queries SQL completas incluyendo los inputs del usuario
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.devsecops=DEBUG

# VULNERABILIDAD #3: H2 console habilitada (comentada pero presente)
# Si se activa expone la base de datos completa via browser
# spring.h2.console.enabled=true
